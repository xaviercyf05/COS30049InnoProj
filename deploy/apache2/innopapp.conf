<VirtualHost *:80>
    ServerName innopappserver.xyz
    ServerAlias api.innopappserver.xyz

    ProxyPreserveHost On

    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    ErrorLog ${APACHE_LOG_DIR}/innopapp-error.log
    CustomLog ${APACHE_LOG_DIR}/innopapp-access.log combined
</VirtualHost>
