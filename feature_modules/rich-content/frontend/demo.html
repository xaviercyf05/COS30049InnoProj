<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rich Content Demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f2f2ec;
        --paper: #ffffff;
        --ink: #15223a;
        --accent: #ea580c;
        --accent-soft: #ffedd5;
        --line: #d8d6cc;
      }

      body {
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: radial-gradient(circle at 15% 20%, #fff8e8 0%, var(--bg) 60%);
        color: var(--ink);
        margin: 0;
        padding: 24px;
      }

      .card {
        max-width: 920px;
        margin: 0 auto;
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 14px;
        box-shadow: 0 14px 40px rgba(21, 34, 58, 0.08);
        overflow: hidden;
      }

      .header {
        padding: 22px;
        background: linear-gradient(135deg, #fff7ed 0%, #ffedd5 100%);
        border-bottom: 1px solid var(--line);
      }

      .header h1 {
        margin: 0;
        font-size: 1.3rem;
      }

      .body {
        padding: 20px;
      }

      .row {
        margin-bottom: 16px;
      }

      label {
        display: block;
        font-size: 0.9rem;
        margin-bottom: 8px;
      }

      input[type="text"],
      input[type="file"] {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px;
        font-size: 0.95rem;
      }

      #editor {
        height: 260px;
      }

      button {
        border: 0;
        border-radius: 999px;
        background: var(--accent);
        color: white;
        font-weight: 700;
        padding: 10px 18px;
        cursor: pointer;
      }

      #result {
        margin-top: 16px;
        background: var(--accent-soft);
        border-radius: 8px;
        padding: 10px;
        white-space: pre-wrap;
      }

      @media (max-width: 720px) {
        body {
          padding: 12px;
        }

        .body,
        .header {
          padding: 14px;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="header">
        <h1>Rich Content Input Demo</h1>
      </div>
      <div class="body">
        <div class="row">
          <label for="token">JWT Token</label>
          <input id="token" type="text" />
        </div>
        <div class="row">
          <label for="title">Title</label>
          <input id="title" type="text" />
        </div>
        <div class="row">
          <label>Formatted Content</label>
          <div id="editor"></div>
        </div>
        <div class="row">
          <label for="files">Attach files/images</label>
          <input id="files" type="file" multiple />
        </div>
        <button id="submitBtn" type="button">Save Content</button>
        <div id="result"></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.min.js"></script>
    <script>
      const quill = new Quill("#editor", {
        theme: "snow",
        modules: {
          toolbar: [
            [{ header: [1, 2, 3, false] }],
            ["bold", "italic", "underline", "strike"],
            [{ list: "ordered" }, { list: "bullet" }],
            ["blockquote", "code-block"],
            ["link", "image"],
            ["clean"],
          ],
        },
      });

      const result = document.getElementById("result");
      document.getElementById("submitBtn").addEventListener("click", async () => {
        const title = document.getElementById("title").value.trim();
        const token = document.getElementById("token").value.trim();
        const files = document.getElementById("files").files;
        const contentHtml = quill.root.innerHTML;

        if (!title || !token) {
          result.textContent = "Title and token are required.";
          return;
        }

        const formData = new FormData();
        formData.append("title", title);
        formData.append("contentHtml", contentHtml);

        for (const file of files) {
          formData.append("files", file);
        }

        try {
          const response = await fetch("/api/v1/rich-content", {
            method: "POST",
            headers: {
              Authorization: `Bearer ${token}`,
            },
            body: formData,
          });

          const data = await response.json();
          result.textContent = JSON.stringify(data, null, 2);
        } catch (error) {
          result.textContent = error.message;
        }
      });
    </script>
  </body>
</html>
