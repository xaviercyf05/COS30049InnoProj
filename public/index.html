<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Innopapp Server Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <main class="shell">
      <header class="hero">
        <p class="eyebrow">Mobile-ready API demo</p>
        <h1>Innopapp Content Gateway</h1>
        <p class="lead">
          Public users can read published posts. Admins can sign in and manage content from desktop
          or mobile devices.
        </p>
        <p id="health-badge" class="badge">Checking API health...</p>
      </header>

      <section class="panel">
        <div class="panel-head">
          <h2>Published Posts</h2>
          <button id="refresh-public" class="btn btn-secondary" type="button">Refresh</button>
        </div>
        <div id="public-posts" class="post-grid"></div>
      </section>

      <section class="panel admin-panel">
        <div class="panel-head">
          <h2>Admin Access</h2>
          <button id="logout-btn" class="btn btn-secondary hidden" type="button">Log out</button>
        </div>

        <form id="login-form" class="stack-form">
          <label>
            Username
            <input id="admin-username" name="username" type="text" autocomplete="username" required />
          </label>
          <label>
            Password
            <input
              id="admin-password"
              name="password"
              type="password"
              autocomplete="current-password"
              required
            />
          </label>
          <button class="btn" type="submit">Sign in</button>
        </form>

        <p id="admin-message" class="admin-message"></p>

        <div id="admin-workspace" class="admin-workspace hidden">
          <h3>Create or Edit Post</h3>
          <form id="post-form" class="stack-form">
            <input id="post-id" type="hidden" />
            <label>
              Title
              <input id="post-title" type="text" maxlength="160" required />
            </label>
            <label>
              Content
              <textarea id="post-content" rows="5" required></textarea>
            </label>
            <label>
              Visibility
              <select id="post-published">
                <option value="true">Published</option>
                <option value="false">Draft</option>
              </select>
            </label>
            <div class="actions">
              <button class="btn" type="submit">Save Post</button>
              <button id="cancel-edit" class="btn btn-secondary" type="button">Cancel Edit</button>
            </div>
          </form>

          <h3>All Posts</h3>
          <ul id="admin-posts" class="admin-list"></ul>

          <hr class="panel-divider" />

          <h3>Register New Admin</h3>
          <form id="admin-user-form" class="stack-form">
            <label>
              Username
              <input id="admin-user-username" type="text" maxlength="100" required />
            </label>
            <label>
              Password
              <input id="admin-user-password" type="password" minlength="8" required />
            </label>
            <button class="btn" type="submit">Create Admin Account</button>
          </form>

          <h3>Registered Admin Accounts</h3>
          <ul id="admin-users" class="admin-list"></ul>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
